  description:
    value: >-
      <blockquote><p>Defy Death for Profane Power</p></blockquote><p>You’ve made
      a pact with a creature that defies the cycle of life and death: a powerful
      lich, vampire, or other entity of undeath. Having once been mortal
      themselves, these ancient patrons know firsthand the paths of ambition and
      the routes past the doors of death. They eagerly share this profane
      knowledge, along with other secrets, with those who work their will among
      the living.</p>
