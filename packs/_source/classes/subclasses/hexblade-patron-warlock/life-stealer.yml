  description:
    value: >-
      <p>Your patron’s might allows you to drain vitality from those you curse,
      granting you the following benefits.</p><p><em><strong>Hungering
      Hex.</strong></em> Whenever the target cursed by your Hex drops to 0 Hit
      Points, you regain Hit Points equal to [[/heal]]{1d8 plus your Charisma
      modifier}.</p><p><em><strong>Inevitable Blade.</strong></em> Once per
      turn, if you make an attack roll against the target cursed by your Hex and
      miss, you can deal Necrotic damage to that creature equal to your Charisma
      modifier (minimum of 1 Necrotic damage).</p>
