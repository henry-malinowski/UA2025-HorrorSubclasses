  description:
    value: >-
      <p>Your patron’s accursed might flows even more strongly through you,
      granting the following benefits.</p><p><em><strong>Accursed
      Critical.</strong></em> Any attack roll you make against the target cursed
      by your Hex scores a Critical Hit on a roll of a 19 or 20 on the
      d20.</p><p><em><strong>Infectious Hex.</strong></em> When you use one of
      your
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uawlkHexbladeMan]{Hexblade’s
      Maneuvers}, you can target one additional creature within 30 feet of the
      cursed target. The additional target takes [[/damage 1d6 Necrotic]]
      damage.</p><p><em><strong>Resilient Hex.</strong></em> Taking damage can’t
      break your &amp;Reference[Concentration] on <em>Hex</em>.</p><section
      class="secret" id="secret-DXVGY3odDTFdgfjj"><p><strong>Foundry
      Note</strong></p><p>This feature does not automate the exapanded Critical
      Hit range.</p></section>
