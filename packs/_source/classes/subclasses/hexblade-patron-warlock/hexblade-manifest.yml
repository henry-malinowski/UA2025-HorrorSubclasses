  description:
    value: >-
      <p>Your patron grants you the power to summon cursed echoes of its blade
      to hinder your foes. You gain the following
      benefits.</p><p><em><strong>Hexblade’s Curse.</strong></em> You can cast
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplHex0000000]{Hex}
      without expending a spell slot a number of times equal to your Charisma
      modifier (minimum of once), and you regain all expended uses when you
      finish a Long Rest. When you cast Hex, a spectral weapon resembling your
      patron orbits the cursed target.</p><hr /><p><em><strong>Hexblade’s
      Maneuvers.</strong></em> Once per turn, when you hit a target cursed by
      your Hex with an attack roll, you can cause one of these additional
      effects:</p><p><em><strong>Draining Slash.</strong></em> The target makes
      a Constitution saving throw against your spell save DC. On a failed save,
      the target can’t make Opportunity Attacks and its Speed is halved until
      the start of your next turn.</p><p><em><strong>Harrowing
      Blade.</strong></em> The target makes a Wisdom saving throw against your
      spell save DC. On a failed save, the next time the target makes an attack
      roll against a creature other than you before the start of your next turn,
      the target takes [[/damage @abilities.cha.mod necrotic]]{Necrotic damage
      equal to your Charisma modifier}.</p><p><em><strong>Stymying
      Mark.</strong></em> The target has &amp;Reference[Disadvantage] on the
      next saving throw it makes before the start of your next turn.</p>
