  description:
    value: >-
      <p>As a &amp;Reference[Bonus Action]{Bonus Action}, you present your Holy
      Symbol and expend a use of your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbclcChannelDiv]{Channel
      Divinity} to <strong>curse</strong> one creature you can see within 30
      feet of yourself until the start of your next turn. While cursed, the
      creature has &amp;Reference[Disadvantage] on attack rolls and saving
      throws.</p><p>When you or an ally you can see hits the cursed target with
      an attack roll, you can end the curse early (no action required) to make
      the attack deal extra Necrotic or Radiant damage (your choice) equal to
      [[/damage 1d8+@classes.cleric.levels radiant necrotic]]{1d8 plus your
      Cleric level}.</p>
