  description:
    value: >-
      <p>You gain the ability to manipulate the balance between life and death,
      granting you the following benefits.</p><p><em><strong>Pull of
      Death.</strong></em> Once per turn, when you cast a spell or hit with an
      attack roll and deal damage to a &amp;Reference[Bloodied] creature, that
      creature takes an extra [[/damage 1d4 Necrotic]]
      damage.</p><p><em><strong>Return to Life.</strong></em> When you would
      normally roll one or more dice to restore Hit Points to a creature at 0
      Hit Points with a spell or Channel Divinity, don’t roll those dice for the
      healing; instead use the highest number possible for each die. For
      example, instead of restoring 2d4 Hit Points to a creature at 0 Hit Points
      with a spell, you restore 8.</p>
