  description:
    value: >-
      <p>Your deep connection to this domain renders you a hallowed harbinger of
      death, granting you the following benefits.</p><p><em><strong>Enhanced
      Necromancy.</strong></em> When you cast a spell of level 5 or lower from
      the Necromancy school that targets one creature or a spell from the
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uaclcSpellsGrave]{Grave
      Domain Spells} table, you can expend a use of
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbclcChannelDiv]{Channel
      Divinity} to target a second creature within the spell’s range. If the
      spell requires costly or consumed &amp;Reference[Material]{Material
      components}, you must provide Material components for each
      target.</p><p><em><strong>Keeper of Souls.</strong></em> When an enemy
      dies within 60 feet of you, you or one creature you can see within 60 feet
      of yourself regains Hit Points equal to [[/healing
      3*@classes.cleric.levels]]{three times your Cleric level}. You can’t use
      this feature if you have the &amp;Reference[Incapacitated apply=false]
      condition. Once you use this feature, you can’t use it again until you
      finish a &amp;Reference[Short Rest]{Short} or &amp;Reference[Long
      Rest].</p>
