  description:
    value: >-
      <p>The spirits of the dead are drawn to you, and echoes of their past
      lives magically manifest as strange curios with resonant
      power.</p><p>Whenever you finish a &amp;Reference[Long Rest], you gain two
      soul trinkets; each soul trinket is a Tiny object (the DM determines the
      trinket’s form or has you roll on the
      @UUID[Compendium.dnd-players-handbook.tables.RollTable.phbStartingTrink]{Trinkets
      table} in the Player’s Handbook to generate it). These trinkets last until
      you finish another Long Rest, at which point they disintegrate. If you
      ever move more than 30 feet from a trinket, the trinket immediately
      teleports to you, appearing somewhere on your person.</p><p>The number of
      soul trinkets you gain when you finish a &amp;Reference[Long Rest]
      increases when you reach Rogue levels 13 (three trinkets) and 17 (four
      trinkets).</p><hr /><p><em><strong>Using Soul Trinkets.</strong></em> You
      can use soul trinkets in the following ways:</p><p><em><strong>Death’s
      Knell.</strong></em> When you deal Sneak Attack damage on your turn, you
      can expend one soul trinket and immediately use Wails from the Grave
      without expending a use of that feature. The expended trinket is
      destroyed.</p><p><em><strong>Life Essence.</strong></em> While you have at
      least one soul trinket, you have Advantage on Death Saving Throws and
      Constitution saving throws.</p><p><em><strong>Spirit Query.</strong></em>
      You can take a Magic action to expend one soul trinket and immediately
      cast the Augury spell, requiring no spell components and using Dexterity
      as the spellcasting modifier. The expended trinket is destroyed.</p><hr
      /><p><em><strong>Regaining Soul Trinkets.</strong></em> When a creature
      you can see within 30 feet of you dies, you can take a
      &amp;Reference[Reaction]{Reaction} to regain one expended soul
      trinket.</p>
