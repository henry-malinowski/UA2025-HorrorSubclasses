  description:
    value: >-
      <p>Immediately after you deal your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbrgeSneakAttac]{Sneak
      Attack} damage to a creature on your turn, you can target a second
      creature that you can see within 30 feet of the first creature. Roll half
      the number of Sneak Attack dice for your level (round up), and the second
      creature takes Necrotic damage equal to the roll’s total as wails of the
      dead momentarily sound around them.</p><p>You can use this feature a
      number of times equal to your Dexterity modifier (minimum of once), and
      you regain all expended uses when you finish a &amp;Reference[Long
      Rest].</p>
