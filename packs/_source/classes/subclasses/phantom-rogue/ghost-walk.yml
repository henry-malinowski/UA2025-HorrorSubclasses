  description:
    value: >-
      <p>As a Bonus Action, you assume a spectral form, gaining the benefits
      below for 10 minutes or until you end them (no action required). Once you
      use this feature, you can’t use it again until you finish a
      &amp;Reference[Long Rest] unless you expend and destroy one of your soul
      trinkets from
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uargeTokensofthe]{Tokens
      of the Departed} (no action required) to restore your use of
      it.</p><p><em><strong>Flight.</strong></em> You gain a Fly Speed of 10
      feet and can hover.</p><p><em><strong>Hazy Form.</strong></em> Attack
      rolls have &amp;Reference[Disadvantage] against
      you.</p><p><em><strong>Incorporeal Movement.</strong></em> You can move
      through occupied spaces as if they were &amp;Reference[Difficult Terrain].
      If you end your turn in such a space, you take [[/damage 1d10 Force]]
      damage.</p>
