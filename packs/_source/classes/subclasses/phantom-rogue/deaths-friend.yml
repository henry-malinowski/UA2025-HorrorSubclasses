  description:
    value: >-
      <p>Your association with death has become so close that you gain the
      following benefits.</p><p><em><strong>Death’s Lament.</strong></em> When
      you use your
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uargeWailsfromth]{Wails
      from the Grave} feature, you can deal the Necrotic damage to both the
      first and the second creature.</p><p><em><strong>Draw of
      Death.</strong></em> When you roll &amp;Reference[Initiative], you regain
      one soul trinket for your Tokens of the Departed if you have none
      remaining.</p><section class="secret"
      id="secret-ajEJoxT1VUZKXWql"><p><strong>Foundry Note</strong></p><p>This
      feature includes an <strong>Enchant</strong> activity which will add a
      prompt to add 1 use when you roll initiative with no uses
      remaining.</p></section>
