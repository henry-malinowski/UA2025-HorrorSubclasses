  description:
    value: >-
      <p>Your ability to channel spirits improves. You gain the following
      benefits.</p><p><em><strong>Power from Beyond.</strong></em> Once per
      turn, when you cast a Bard spell that deals damage or restores Hit Points,
      roll a [[/r d6]]. You gain a bonus to one of the spell’s damage rolls or
      to the total Hit Points the spell restores equal to the number
      rolled.</p><p><em><strong>Spiritual Manifestation.</strong></em> You
      always have the <em>Spirit Guardians</em> spell prepared. You can cast the
      spell once without a spell slot, and you regain the ability to cast it in
      this way when you finish a &amp;Reference[Long Rest].</p><p>Whenever you
      start casting the spell, you can modify it so the spirits also guard
      against worldly threats. When cast in this way, you and allies within the
      spell’s Emanation have &amp;Reference[Half Cover]. Once you modify the
      spell in this way, you can’t do so again until you finish a Short or Long
      Rest.</p><section class="secret"
      id="secret-urklkSP4GLnLBVQY"><p><strong>Foundry Note</strong></p><p>This
      feature tracks you use of the second paragraph of Spiritual
      Manifestation.</p></section>
