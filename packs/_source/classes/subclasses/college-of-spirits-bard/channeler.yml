  description:
    value: >-
      <p>You learn how to contact spirits beyond the grave, letting their power
      and knowledge flow through you. You gain the following
      benefits.</p><p><em><strong>Guiding Whispers.</strong></em> You know the
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplGuidance00]{Guidance}
      cantrip. It has a range of 60 feet when you cast
      it.</p><p><em><strong>Spiritual Focus.</strong></em> You employ tools that
      aid you in channeling spirits. You gain a Gaming Set (Playing Cards). You
      have proficiency with this Gaming Set, and you can use the cards or one of
      the following items as a Spellcasting Focus for your Bard spells: Arcane
      Focus (Crystal or Orb), Candle, or Ink Pen.</p>
