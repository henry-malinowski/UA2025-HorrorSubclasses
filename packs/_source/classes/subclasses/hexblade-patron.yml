  description:
    value: >-
      <blockquote><p>Forge a Pact with a Cursed Blade</p></blockquote><p>You’ve
      made a pact with a sentient magic weapon and the cursed forces contained
      within its blade. Such a weapon could be the sword sheathed at a Warlock’s
      side, or it could be an infamous magic weapon stored elsewhere, projecting
      its power across the multiverse to further its cunning plans. To those who
      are willing to follow this weapon’s whims, these inscrutable patrons offer
      the power to bestow malignant curses, deliver punishing blows, and bolster
      the wielder.</p>
