  description:
    value: >-
      <p>Your dedication to eldritch forest beings alters you further. When
      transformed using
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uargrWrathoftheW]{Wrath
      of the Wild}, you gain the following additional
      benefits.</p><p><em><strong>Eerie Aura.</strong></em> When a creature
      fails its saving throw against your Unnerving Aura, it also takes
      Necrotic, Poison, or Psychic damage (your choice) equal to your Ranger
      level. This damage ignores Resistance.</p><p><em><strong>Strangling
      Roots.</strong></em> When you hit a creature with an attack roll using a
      weapon, you can activate the Sap or Slow mastery property in addition to a
      different mastery property you’re using with that weapon.</p>
