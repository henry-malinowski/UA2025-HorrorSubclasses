  description:
    value: >-
      <p>You become wholly suffused with the forest’s ancient power, granting
      you the following benefits.</p><p><em><strong>Persistent
      Hunt.</strong></em> If you drop to 0 Hit Points while transformed using
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uargrWrathoftheW]{Wrath
      of the Wild} and don’t die outright, you can expend a level 4+ spell slot
      (no action required). Your Hit Points then instead change to an amount
      equal to five times the level of the spell slot
      expended.</p><p><em><strong>Timeless.</strong></em> You have Immunity to
      the &amp;Reference[Exhaustion apply=false] condition.</p>
