  description:
    value: >-
      <p>You draw on the strange and ancient horrors of the land for power. When
      you cast
      <em>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplHuntersMar]{Hunter’s
      Mark}</em>, you transform, gaining the following benefits for the duration
      of the spell.</p><p><em><strong>Ancient Armor.</strong></em> You gain a
      bonus to your AC equal to your Wisdom modifier (minimum of +1). Your body
      is wreathed in rotten bark or beastly
      bristles.</p><p><em><strong>Unnerving Aura.</strong></em> When an enemy
      starts its turn within a 10-foot Emanation originating from you, it makes
      a Wisdom saving throw against your spell save DC. On a failed save, it can
      take either an action or a Bonus Action on this turn, not both. Your
      shadow lengthens and twists around you, or you sprout unnatural growths
      like bloody antlers or putrid fangs.</p><section class="secret"
      id="secret-jUGxhwYgQPFEdAaA"><p><strong>Foundry Note</strong></p><p>This
      feature adds an Active Affect to your sheet which you can enable for the
      duration of your Hunter's Mark.</p></section>
