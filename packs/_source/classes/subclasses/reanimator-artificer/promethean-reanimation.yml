  description:
    value: >-
      <p>You have mastered the science of revivification, granting you the
      following benefits.</p><p><em><strong>Facilitated Revival.</strong></em>
      When you cast <em>Revivify</em> or <em>Raise Dead</em>, the cost of any
      &amp;Reference[Material]{Material} components needed for that spell is
      halved.</p><p><em><strong>Improved Companion.</strong></em> The damage of
      your
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uaartReanimatedC]{Reanimated
      Companion’s}
      @UUID[Compendium.UA2025-HorrorSubclasses.actors.Actor.uaCompTemplate00.Item.0eBNLjj2M0kVJFRU]{Death
      Burst} increases to [[/damage 4d6 necrotic]]{4d6}. Necrotic damage dealt
      by your companion ignores Resistance.</p><p><em><strong>Life
      Transfer.</strong></em> You can siphon the animating magic of your
      companion to bolster yourself. When you take damage, you can take a
      &amp;Reference[Reaction]{Reaction} to cause your Reanimated Companion to
      drop to 0 Hit Points. The companion immediately dies (triggering its Death
      Burst trait), and you [[/healing @classes.artificer.levels]]{regain a
      number of Hit Points} equal to your Artificer level.</p><section
      class="secret" id="secret-rBWUASQ7jg8xbZYr"><p><strong>Foundry
      Note</strong></p><p>Your Improved Reanimation automatically improves when
      you gain this feature.</p></section>
