  description:
    value: >-
      <p>You experiment and alter your companion further. Whenever you create a
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uaartReanimatedC]{Reanimated
      Companion}, it gains one of the following options of your choice; choose
      when you create the companion.</p><p><em><strong>Bloated.</strong></em>
      The companion becomes Large or Medium (your choice). Whenever it hits a
      Large or smaller creature with its
      @UUID[Compendium.UA2025-HorrorSubclasses.actors.Actor.uaCompTemplate00.Item.tbgENUWNRnj62CX4]{Dreadful
      Swipe} action, that creature can also be pushed up to 10 feet away from
      the companion. Additionally, you can add your Intelligence modifier to the
      damage dealt by the companion’s
      @UUID[Compendium.UA2025-HorrorSubclasses.actors.Actor.uaCompTemplate00.Item.0eBNLjj2M0kVJFRU]{Death
      Burst}.</p><p><em><strong>Gaunt.</strong></em> The companion’s Speed
      increases to 45 feet, and it gains a Climb Speed equal to its Speed. It
      can climb difficult surfaces, including along ceilings, without needing to
      make an ability check. In addition, whenever a creature of your choice
      starts its turn within a 10-foot Emanation originating from your
      companion, the creature must succeed on a Wisdom saving throw against your
      spell save DC or have the &amp;Reference[Frightened] condition until the
      start of its next turn.</p><p><em><strong>Moist.</strong></em> The
      companion gains a Swim Speed equal to its Speed. In addition, whenever the
      companion is hit by an attack roll from a creature within 10 feet of it,
      the attacker takes Acid damage equal to your Intelligence
      modifier.</p><section class="secret"
      id="secret-ri6LA4OpMu82CNkx"><p><strong>Foundry Note</strong></p><p>This
      feature improves your summons as you gain levels and includes and includes
      improvements granted to your summons by Promethean
      Reanimation.</p></section>
