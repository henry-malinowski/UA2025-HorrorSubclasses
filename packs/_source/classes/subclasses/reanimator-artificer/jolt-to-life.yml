  description:
    value: >-
      <p>When you cast <em>Spare the Dying</em>, you can modify the spell so
      that it sends a jolt of electricity through the target, reviving it. The
      target regains 1 Hit Point, and each creature in a 10-foot Emanation
      originating from the target makes a [[/save]]{Dexterity saving throw}
      against your spell save DC, taking Lightning damage equal to
      [[/damage]]{1d4 plus half your Artificer level} (round up) on a failed
      save or half as much damage on a successful one.</p><p>You can modify the
      spell this way a number of times equal to your Intelligence modifier, and
      you regain all expended uses when you finish a Long Rest.</p>
