  description:
    value: >-
      <p>Whenever you create a
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uaartReanimatedC]{Reanimated
      Companion}, it gains one of the following options of your choice; choose
      when you create the companion.</p><p><em><strong>Arcane
      Conduit.</strong></em> You can cast spells as though you were in the
      companion’s space, but you must use your own senses. Once per turn, when
      you cast an Artificer spell from the Evocation or Necromancy schools and
      deal damage while your companion is within 120 feet of you, you can add
      your Intelligence modifier to one damage roll of that
      spell.</p><p><em><strong>Ferocity.</strong></em> When you command your
      companion to take the Dreadful Swipe action, the companion can use it
      twice.</p><section class="secret"
      id="secret-uPvS0h6ULIF0sUAR"><p><strong>Foundry Note</strong></p><p>This
      feature improves your summons as you gain levels but doesn't include later
      summon features from Improved Reanimation. Once you gain that feature, use
      it to create your Reanimated Companion instead of this
      feature.</p></section>
