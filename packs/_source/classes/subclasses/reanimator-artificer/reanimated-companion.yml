  description:
    value: >-
      <p>Using Tinker’s Tools or another type of Artisan’s Tools with which you
      have proficiency, you can take a &amp;Reference[Magic] action to create a
      <strong>@UUID[Compendium.UA2025-HorrorSubclasses.actors.Actor.uaCompTemplate00]{Reanimated
      Companion}</strong> (see the stat block) through the power of necromancy
      and science. The companion manifests in an unoccupied space within 5 feet
      of you. You determine the companion’s appearance; your choices don’t
      affect the companion’s game statistics.</p><p>The companion is
      &amp;Reference[Friendly] to you and your allies and obeys you. It lasts
      until you finish a &amp;Reference[Long Rest] or until you take a Magic
      action to dismiss it early, at which point it harmlessly collapses into a
      pile of viscera. It immediately drops to 0 Hit Points and dies (triggering
      its Death Burst trait) if you die. Once you create a companion, you can’t
      do so again until you finish a Long Rest or expend a spell slot to create
      one. You can have only one companion at a time and can’t create one while
      your companion is present.</p><p><em><strong>The Companion in
      Combat.</strong></em> In combat, the companion acts during your turn. It
      can move and take its &amp;Reference[Reaction]{Reaction } on its own, but
      the only action it takes is the &amp;Reference[Dodge] action unless you
      take a &amp;Reference[Bonus Action]{Bonus Action} to command it to take an
      action. If you have the &amp;Reference[Incapacitated apply=false]
      condition, the companion acts on its own and isn’t limited to the Dodge
      action.</p><section class="fvtt advice"
      style="margin:0.5rem;padding:0.5rem"><article><p>In addition to the noted
      usage of the Artificier's spellcasting and Intelligence in the Companion's
      Traits and Actions, the following attributes are also
      affected.</p><table><caption>Reanimated
      Companion</caption><tbody><tr><td><strong>AC</strong></td><td>10 + your
      Intelligence modifier</td></tr><tr><td><strong>HP</strong></td><td>4 +
      four time your Artificer
      level</td></tr><tr><td><strong>HD</strong></td><td>[d6s] equal to your
      Artificer level</td></tr></tbody></table></article></section><section
      class="secret" id="secret-dx4o1KwXZfuogmJf"><p><strong>Foundry
      Note</strong></p><p>This feature improves your summons as you gain levels
      but doesn't include later summon features from Strange Modifications. Once
      you gain that feature, use it to create your Reanimated Companion instead
      of this feature.</p><p>The <strong>Command</strong> activity open needs to
      be used if you're tracking your Bonus Action usage.</p></section>
