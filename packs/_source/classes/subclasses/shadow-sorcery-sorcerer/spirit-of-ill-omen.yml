  description:
    value: >-
      <p>You can cast <em>Summon Undead</em> without a
      &amp;Reference[Material]{Material} component. You can also cast it once
      without a spell slot, and you regain the ability to cast it in this way
      when you finish a &amp;Reference[Long Rest].</p><p>Whenever you start
      casting the spell, you can modify it so that it doesn’t require
      &amp;Reference[Concentration]. If you do so, the spell’s duration becomes
      1 minute for that casting, and the spell ends early if you cast it
      again.</p>
