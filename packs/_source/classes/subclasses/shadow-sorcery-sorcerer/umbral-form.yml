  description:
    value: >-
      <p>As a &amp;Reference[Bonus Action], you adopt a shadowy form, gaining
      the benefits below for 1 minute, until you have the
      &amp;Reference[Incapacitated apply=false] condition, or until you end the
      form (no action required). Once you use this feature, you can’t use it
      again until you finish a &amp;Reference[Long Rest] unless you spend 6
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbscrFontOfMagi]{Sorcery
      Points} (no action required) to restore your use of
      it.</p><p><em><strong>Incorporeal Movement.</strong></em> You can move
      through occupied spaces as if they were &amp;Reference[Difficult Terrain].
      If you end your turn in such a space, you take [[/damage 1d10 Force]]
      damage.</p><p><em><strong>Shadow Resilience.</strong></em> You have
      Resistance to all damage except Force and Radiant
      damage.</p><p><em><strong>Strength of the Grave.</strong></em> If you
      would drop to 0 Hit Points and not die outright, you can make a Charisma
      saving throw (DC 5 plus half the damage taken). If you succeed, your Hit
      Points instead change to a number equal to three times your Sorcerer
      level.</p>
