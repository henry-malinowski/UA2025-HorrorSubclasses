  description:
    value: >-
      <p>Your Form of Dread improves, granting you the following benefits while
      you are using it.</p><p><em><strong>Flight.</strong></em> You have a Fly
      Speed equal to your Speed and can hover.</p><p><em><strong>Profane
      Casting.</strong></em> Whenever you cast a Warlock spell from the
      Conjuration or Necromancy school, you cast it without any Verbal, Somatic,
      or Material components, except Material components that are consumed by
      the spell or that have a cost specified in the
      spell.</p><p><em><strong>Vitality Siphon.</strong></em> Once per turn when
      you deal Necrotic damage to a creature, you regain Hit Points equal to
      your Charisma modifier (minimum of 1 Hit Point).</p>
