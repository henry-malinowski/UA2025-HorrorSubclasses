  description:
    value: >-
      <p>Your patron’s powers have a profound effect on your body and magic,
      granting you the following benefits. </p><p><em><strong>Arcane
      Necrosis.</strong></em> Whenever you cast a spell or hit a creature with
      an attack roll and deal Necrotic damage, the damage dealt ignores
      Resistance to Necrotic damage.</p><p>Additionally, once per turn when you
      cast a spell that deals damage while using your
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uawlkFormofDread]{Form
      of Dread}, you can change that spell’s damage type to
      Necrotic.</p><p><em><strong>Undead Endurance.</strong></em> You don’t gain
      &amp;Reference[Exhaustion apply=false] levels from dehydration,
      malnutrition, or suffocation. In addition, you don’t need to sleep, and
      magic can’t put you to sleep.</p>
