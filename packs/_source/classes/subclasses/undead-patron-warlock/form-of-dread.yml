  description:
    value: >-
      <p>As a &amp;Reference[Bonus Action]{Bonus Action}, you transform into an
      avatar of your patron’s dreadful power, gaining the benefits below for 1
      minute, until you have the &amp;Reference[Incapacitated apply=false]
      condition, or until you end the form (no action required). You can
      transform a number of times equal to your Charisma modifier (minimum of
      once), and you regain all expended uses when you finish a
      &amp;Reference[Long Rest].</p><p><em><strong>Facsimile of
      Life.</strong></em> You gain Temporary Hit Points equal to 1d10 plus your
      Warlock level.</p><p><em><strong>Frightful Avatar.</strong></em> You have
      Immunity to the &amp;Reference[Frightened apply=false] condition.
      Additionally, once per turn, when you hit a creature with an attack roll,
      you can force it to make a Wisdom saving throw against your spell save DC.
      On a failed save, the target has the &amp;Reference[Frightened] condition
      until the end of your next turn.</p>
