  description:
    value: >-
      <p>Your connection to undeath now saturates your body. You gain the
      following benefits.</p><p><em><strong>Necrotic Resilience.</strong></em>
      You have Resistance to Necrotic damage. While using your
      @UUID[Compendium.UA2025-HorrorSubclasses.classes.Item.uawlkFormofDread]{Form
      of Dread}, you have Immunity to Necrotic damage.</p><p><em><strong>Unholy
      Resuscitation.</strong></em> If you drop to 0 Hit Points and don’t die
      outright, you can cause your body to erupt with deathly energy. Each
      creature of your choice in a 30-foot Emanation originating from you makes
      a Constitution saving throw against your spell save DC, taking Necrotic
      damage equal to 2d10 plus your Warlock level on a failure or half as much
      damage on a success. Your Hit Points then change to 10 times your Charisma
      modifier (minimum of 10 Hit Points), and you gain 1
      &amp;Reference[Exhaustion] level.</p><p>Once you use this benefit, you
      can’t use it again until you finish a Short or Long Rest.</p>
