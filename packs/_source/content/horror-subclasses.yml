  - sort: 700000
    name: 'Warlock: Hexblade Patron'
    type: subclass
    _id: 8PuU2VobgS4zmQ10
    system:
      item: Compendium.UA2025-HorrorSubclasses.classes.Item.uawlkHexbladePat
      description:
        value: >-
          <p>@Embed[Compendium.UA2025-HorrorSubclasses.content.JournalEntry.uaArtHandouts000.JournalEntryPage.55P9YYEOGPwO52RS
          caption=false cite=false]</p><blockquote><p>Forge a Pact with a Cursed
          Blade</p></blockquote><p>You’ve made a pact with a sentient magic
          weapon and the cursed forces contained within its blade. Such a weapon
          could be the sword sheathed at a Warlock’s side, or it could be an
          infamous magic weapon stored elsewhere, projecting its power across
          the multiverse to further its cunning plans. To those who are willing
          to follow this weapon’s whims, these inscrutable patrons offer the
          power to bestow malignant curses, deliver punishing blows, and bolster
          the wielder.</p>
      style: ''
