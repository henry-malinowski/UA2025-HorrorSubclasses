      description:
        value: >-
          <p>@Embed[Compendium.UA2025-HorrorSubclasses.content.JournalEntry.uaArtHandouts000.JournalEntryPage.fwubDTuCBvrMjyVM
          cite=false caption=false]</p><blockquote><p>Reassemble Corpses to
          Raise the Dead</p></blockquote><p>Reanimators defy the laws of nature
          in pursuit of gruesome experiment. These grim Artificers stitch
          together servants from disparate corpses, use foul magic to strengthen
          the living, and transform the art of necromancy into a terrifying
          science.</p>
