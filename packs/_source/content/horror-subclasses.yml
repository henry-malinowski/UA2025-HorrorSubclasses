  - sort: 600000
    name: 'Sorcerer: Shadow Sorcery'
    type: subclass
    _id: 7PsDPuG82X6GU799
    system:
      item: Compendium.UA2025-HorrorSubclasses.classes.Item.uasrcShadowSorce
      description:
        value: >-
          <p>@Embed[Compendium.UA2025-HorrorSubclasses.content.JournalEntry.uaArtHandouts000.JournalEntryPage.DMFmsYKJX3aibnJZ
          caption=false cite=false]</p><blockquote><p>Bend Darkness and Doom to
          Your Will</p></blockquote><p>Your innate magic comes from the
          Shadowfell itself. You might trace your lineage to an entity from that
          place, or perhaps you were exposed to the Shadowfell’s sinister energy
          and were transformed by it. Your shadowy magic allows you to command
          darkness, undeath, and woe with ease.</p>
