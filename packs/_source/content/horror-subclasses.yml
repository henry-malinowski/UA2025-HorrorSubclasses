  - sort: 400000
    name: 'Ranger: Hollow Warden'
    type: subclass
    _id: bFbK4bvmbgNmsOZq
    system:
      item: Compendium.UA2025-HorrorSubclasses.classes.Item.uargrHollowWarde
      description:
        value: >-
          <p>@Embed[Compendium.UA2025-HorrorSubclasses.content.JournalEntry.uaArtHandouts000.JournalEntryPage.1VcTHPbmwoztgJcU
          caption=false cite=false]</p><blockquote><p>Draw on the Might of
          Ancient Wild Terrors</p></blockquote><p>Legends tell that the most
          ancient and fearsome terrors lurk deep within the old places of the
          earth—unfathomable and bloodthirsty entities of fallow soil and
          sharpened claws. Hollow Wardens venerate and draw power from such
          beings, transforming themselves into similarly merciless and monstrous
          guardians that stalk along jagged coastlines, across steep mountain
          crags, and through other dark and wild places.</p>
      style: ''
