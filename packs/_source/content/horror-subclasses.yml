  - sort: 300000
    name: 'Cleric: Grave Domain'
    type: subclass
    _id: jivl9Z6KjmzO2o62
    system:
      item: Compendium.UA2025-HorrorSubclasses.classes.Item.uaclcGraveDomain
      description:
        value: >-
          <p>@Embed[Compendium.UA2025-HorrorSubclasses.content.JournalEntry.uaArtHandouts000.JournalEntryPage.qfnB9e3FhizEdgxU
          caption=false cite=false]</p><blockquote><p>Embody Deific Forces of
          Death</p></blockquote><p>The Grave Domain concerns itself with the
          boundary between life and death. To those who tap into this domain’s
          power, death is a foundational, natural, and inevitable part of the
          multiverse. Such Clerics seek to destroy Undead and strive to shepherd
          spirits to the afterlife (whether those spirits want to go or
          not).</p><p>The magic of this domain also allows these Clerics to
          stave off death for a time, particularly for those who still have some
          great work to accomplish in the world. But this is merely a delay of
          death, not a denial of it, for the grave will always claim its
          due.</p>
      style: ''
