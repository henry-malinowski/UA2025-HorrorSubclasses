  - sort: 200000
    name: 'Bard: College of Spirits'
    type: subclass
    _id: aGg4vn6m0KV23C6e
    system:
      item: Compendium.UA2025-HorrorSubclasses.classes.Item.uabrdSpirits0000
      description:
        value: >-
          <p>@Embed[Compendium.UA2025-HorrorSubclasses.content.JournalEntry.uaArtHandouts000.JournalEntryPage.I6a6BLlFUFhMIjlr
          caption=false cite=false]</p><blockquote><p>Call Forth Spirits from
          Beyond the Grave</p></blockquote><p>Using occult trappings, Bards of
          the College of Spirits conjure legendary and long-dead spirits to
          change the world once more. But such entities are capricious, and what
          a Bard summons isn’t always entirely under their control.</p>
