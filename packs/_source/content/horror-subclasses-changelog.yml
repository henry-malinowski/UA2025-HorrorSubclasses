    text:
      format: 1
      content: >-
        <h3>Added</h3><ul><li><p>Auto opening Journal Based change
        logs</p></li><li><p>Proper VSC-able YML files instead of raw leveldb
        files in the repo</p></li></ul><h3>Changed</h3><ul><li><p>Compendium
        structure normalized to flatter structure</p></li><li><p>Compendium
        UUIDs are now noted in the compendium-names.md file and are
        deterministic going forward</p><ul><li><p>This is a breaking
        change</p></li></ul></li><li><p>Journal's now pull from the official PHB
        styling</p></li></ul><h3>Fixed</h3><ul><li><p>Script now uses proper
        `.mjs` file extension</p></li><li><p>Missing <strong>Reanimated
        Companion</strong> creature links</p></li><li><p>Missing Use activity on
        <em>Spirits from Beyond</em></p></li></ul>
